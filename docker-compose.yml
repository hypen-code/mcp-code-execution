version: "3.9"

networks:
  mce_network:
    driver: bridge

services:
  mce:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mce-server
    environment:
      - MCE_LOG_LEVEL=INFO
      - MCE_COMPILE_ON_STARTUP=true
      - MCE_DOCKER_IMAGE=mce-sandbox:latest
      - MCE_NETWORK_MODE=mce_network
      - MCE_CACHE_ENABLED=true
      # Override with real values via .env file:
      # MCE_WEATHER_BASE_URL=https://api.weather.example.com/v1
      # MCE_WEATHER_AUTH=Authorization: Bearer <token>
    volumes:
      - ./config:/app/config:ro
      - ./compiled:/app/compiled
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock # Docker-in-Docker for sandbox
    ports:
      - "8000:8000"
    networks:
      - mce_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()" ]
      interval: 30s
      timeout: 5s
      retries: 3
