repos:
  # Ruff: lint and format on every commit
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Mypy: type-check on every commit (uses project venv — run `pip install -e ".[dev]"` first)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [src/]
        pass_filenames: false

      # Pytest unit tests: only on pre-push (slow — skipped on every commit)
      - id: pytest-unit
        name: pytest (unit)
        entry: pytest
        language: system
        types: [python]
        args: [tests/unit/, --tb=short, -q, --no-cov]
        pass_filenames: false
        stages: [pre-push]
