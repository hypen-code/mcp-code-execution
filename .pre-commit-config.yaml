repos:
  # --- Ruff: lint + format --------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # --- Mypy: strict type checking -------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings>=2.0

  # --- Pytest with mandatory coverage >= 90% --------------------------------
  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest (coverage >= 90%)
        language: system
        entry: bash -c 'pytest --cov=mce --cov-report=term-missing --cov-fail-under=90 -q'
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
