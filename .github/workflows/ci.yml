name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: ruff check
        shell: bash
        run: |
          set -o pipefail
          ruff check src/ tests/ 2>&1 | tee ruff-report.txt

      - name: ruff format
        if: always()
        shell: bash
        run: |
          set -o pipefail
          { echo ""; echo "=== ruff format ==="; ruff format --check src/ tests/; } 2>&1 | tee -a ruff-report.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-report
          path: ruff-report.txt

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: mypy
        shell: bash
        run: |
          set -o pipefail
          mypy src/ 2>&1 | tee mypy-report.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mypy-report
          path: mypy-report.txt

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: pytest
        shell: bash
        run: |
          set -o pipefail
          pytest --tb=short -q --cov-report=xml 2>&1 | tee pytest-report.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: pytest-report.txt

      - uses: codecov/codecov-action@v4
        if: success()
        with:
          file: coverage.xml

  pr-report:
    name: PR Quality Report
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [lint, typecheck, test]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ruff-report
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: mypy-report
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: pytest-report
        continue-on-error: true

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const read = (path) => {
              try { return fs.readFileSync(path, 'utf8').trim(); }
              catch { return '_output not available_'; }
            };

            const ruffOut = read('ruff-report.txt');
            const mypyOut = read('mypy-report.txt');
            const testOut = read('pytest-report.txt');

            const badge = (r) =>
              r === 'success'   ? '✅ Pass'       :
              r === 'skipped'   ? '⏭️ Skip'       :
              r === 'cancelled' ? '⚪ Cancelled'  :
                                  '❌ Fail';

            const ruffResult = '${{ needs.lint.result }}';
            const mypyResult = '${{ needs.typecheck.result }}';
            const testResult = '${{ needs.test.result }}';

            const allPass = [ruffResult, mypyResult, testResult].every(r => r === 'success');
            const banner  = allPass
              ? '> ✅ All checks passed — ready to merge.'
              : '> ❌ Some checks failed — please fix before merging.';

            const cap = (s, n = 6000) =>
              s.length > n ? s.slice(0, n) + '\n…(truncated)' : s;

            const body = [
              '<!-- quality-report -->',
              '## Quality Report',
              banner,
              '',
              '| Check | Status |',
              '|---|---|',
              `| Ruff (lint + format) | ${badge(ruffResult)} |`,
              `| Mypy (type check)    | ${badge(mypyResult)} |`,
              `| Tests                | ${badge(testResult)} |`,
              '',
              `<details><summary>${badge(ruffResult)} Ruff</summary>`,
              '',
              '```',
              cap(ruffOut),
              '```',
              '</details>',
              '',
              `<details><summary>${badge(mypyResult)} Mypy</summary>`,
              '',
              '```',
              cap(mypyOut),
              '```',
              '</details>',
              '',
              `<details><summary>${badge(testResult)} Tests</summary>`,
              '',
              '```',
              cap(testOut),
              '```',
              '</details>',
              '',
              '---',
              `_Generated by CI · ${new Date().toUTCString()}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- quality-report -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  release:
    name: Release Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -e .

      - name: Check version consistency
        run: |
          VERSION=$(python -c "from mfp import __version__; print(__version__)")
          echo "Version: $VERSION"
